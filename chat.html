<!DOCTYPE html>
<html dir="rtl">
<head>
  <title>الشات 💬</title>

  <style>
    body {
      font-family: Arial;
      background: #ffe6ea;
      margin: 0;
    }

    .chat-box {
      height: 75vh;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .message {
      padding: 10px 15px;
      border-radius: 15px;
      margin: 5px;
      max-width: 70%;
      font-size: 14px;
      background: white;
    }

    .me {
      background: #ff4d6d;
      color: white;
      margin-left: auto;
    }

    .emoji-bar {
      text-align: center;
      margin: 5px;
    }

    .emoji-bar span {
      font-size: 20px;
      margin: 5px;
      cursor: pointer;
    }

    .input-box {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px;
      background: #ff4d6d;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<h2 id="chatWith">💬</h2>

<div class="chat-box" id="chatBox"></div>

<!-- 😈 الإيموجي -->
<div class="emoji-bar">
  <span onclick="addEmoji('😊')">😊</span>
  <span onclick="addEmoji('❤️')">❤️</span>
  <span onclick="addEmoji('😂')">😂</span>
  <span onclick="addEmoji('🔥')">🔥</span>
</div>

<div class="input-box">
  <input id="msg" placeholder="اكتب رسالة..." onkeypress="handleKey(event)">
  <button onclick="send()">إرسال</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
  authDomain: "marriage-app-3b2d2.firebaseapp.com",
  projectId: "marriage-app-3b2d2",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("userEmail");
const chatUser = localStorage.getItem("chatUser");

document.getElementById("chatWith").innerText = "💬 مع " + chatUser;

const chatBox = document.getElementById("chatBox");

/* 🔥 إرسال */
window.send = async () => {
  const text = document.getElementById("msg").value;

  if (!text) return;

  await addDoc(collection(db, "messages"), {
    from: currentUser,
    to: chatUser,
    text: text
  });

  document.getElementById("msg").value = "";
  loadMessages();
};

/* 🔥 Enter */
window.handleKey = (e) => {
  if (e.key === "Enter") {
    send();
  }
};

/* 😈 إيموجي */
window.addEmoji = (emoji) => {
  const input = document.getElementById("msg");
  input.value += emoji;
};

/* 📩 تحميل الرسائل */
async function loadMessages() {
  const snapshot = await getDocs(collection(db, "messages"));

  chatBox.innerHTML = "";

  snapshot.forEach((doc) => {
    const msg = doc.data();

    if (
      (msg.from === currentUser && msg.to === chatUser) ||
      (msg.from === chatUser && msg.to === currentUser)
    ) {
      chatBox.innerHTML += `
        <div class="message ${msg.from === currentUser ? 'me' : ''}">
          ${msg.text}
        </div>
      `;
    }
  });

  chatBox.scrollTop = chatBox.scrollHeight;
}

loadMessages();
setInterval(loadMessages, 2000);
</script>

</body>
</html>
