<!DOCTYPE html>
<html dir="rtl">
<head>
  <title>الشات 💬</title>

  <style>
    body {
      font-family: Arial;
      background: #ffe6ea;
      margin: 0;
    }

    .chat-box {
      height: 65vh;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .message {
      padding: 10px 15px;
      border-radius: 15px;
      margin: 5px;
      max-width: 70%;
      background: white;
    }

    .me {
      background: #ff4d6d;
      color: white;
      margin-left: auto;
    }

    .status {
      font-size: 12px;
      margin-top: 3px;
    }

    .online {
      color: green;
    }

    .offline {
      color: gray;
    }

    .input-box {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      align-items: center;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px;
      border: none;
      font-size: 20px;
      cursor: pointer;
    }

    .send-btn {
      background: #ff4d6d;
      color: white;
    }

    .emoji-panel {
      position: fixed;
      bottom: 60px;
      width: 100%;
      background: white;
      max-height: 200px;
      overflow-y: auto;
      display: none;
      padding: 10px;
    }

    .emoji-panel span {
      font-size: 24px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2 id="chatWith">💬</h2>
<div id="statusText" class="status"></div>

<div class="chat-box" id="chatBox"></div>

<div class="emoji-panel" id="emojiPanel"></div>

<div class="input-box">
  <button onclick="toggleEmoji()">😊</button>
  <button onclick="document.getElementById('fileInput').click()">📷</button>
  <button onclick="startRecording()">🎤</button>

  <input id="msg" placeholder="اكتب رسالة..." onkeypress="handleKey(event)">
  <button class="send-btn" onclick="send()">➤</button>
</div>

<input type="file" id="fileInput" style="display:none">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
  authDomain: "marriage-app-3b2d2.firebaseapp.com",
  projectId: "marriage-app-3b2d2",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("userEmail");
const chatUser = localStorage.getItem("chatUser");

document.getElementById("chatWith").innerText = "💬 مع " + chatUser;

const chatBox = document.getElementById("chatBox");

/* 🟢 Online status */
setDoc(doc(db, "status", currentUser), {
  online: true
});

/* 🔄 متابعة حالة الشخص */
onSnapshot(doc(db, "status", chatUser), (docSnap) => {
  const status = docSnap.data();
  document.getElementById("statusText").innerHTML =
    status?.online ? "🟢 متصل الآن" : "⚫ غير متصل";
});

/* 🔥 إرسال */
window.send = async () => {
  const text = document.getElementById("msg").value;
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    from: currentUser,
    to: chatUser,
    text: text,
    type: "text",
    seen: false
  });

  document.getElementById("msg").value = "";
};

/* 🔥 Enter */
window.handleKey = (e) => {
  if (e.key === "Enter") send();
};

/* 😈 Emoji */
window.toggleEmoji = () => {
  const panel = document.getElementById("emojiPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

window.addEmoji = (e) => {
  document.getElementById("msg").value += e;
};

["😀","😂","😍","🔥","❤️","👍"].forEach(e => {
  document.getElementById("emojiPanel").innerHTML +=
    `<span onclick="addEmoji('${e}')">${e}</span>`;
});

/* 📷 صورة */
document.getElementById("fileInput").addEventListener("change", function() {
  const file = this.files[0];
  const reader = new FileReader();

  reader.onload = async function(e) {
    await addDoc(collection(db, "messages"), {
      from: currentUser,
      to: chatUser,
      image: e.target.result,
      type: "image"
    });
  };

  reader.readAsDataURL(file);
});

/* 🎤 صوت */
let recorder;
window.startRecording = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  recorder = new MediaRecorder(stream);
  let chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = async () => {
    const blob = new Blob(chunks);
    const reader = new FileReader();

    reader.onloadend = async () => {
      await addDoc(collection(db, "messages"), {
        from: currentUser,
        to: chatUser,
        audio: reader.result,
        type: "audio"
      });
    };

    reader.readAsDataURL(blob);
  };

  recorder.start();
  setTimeout(() => recorder.stop(), 3000);
};

/* ⚡ Realtime */
onSnapshot(collection(db, "messages"), (snapshot) => {
  chatBox.innerHTML = "";

  snapshot.forEach(doc => {
    const msg = doc.data();

    if (
      (msg.from === currentUser && msg.to === chatUser) ||
      (msg.from === chatUser && msg.to === currentUser)
    ) {

      let seenText = msg.from === currentUser
        ? (msg.seen ? "✔✔" : "✔")
        : "";

      chatBox.innerHTML += `
        <div class="message ${msg.from === currentUser ? 'me' : ''}">
          ${msg.text || ""}
          ${msg.image ? `<img src="${msg.image}" width="120">` : ""}
          ${msg.audio ? `<audio controls src="${msg.audio}"></audio>` : ""}
          <div class="status">${seenText}</div>
        </div>
      `;
    }
  });

  chatBox.scrollTop = chatBox.scrollHeight;
});
</script>

</body>
</html>
