<!DOCTYPE html>
<html dir="rtl">
<head>
  <title>الشات 💬</title>

  <style>
    body {
      font-family: Arial;
      background: #ffe6ea;
      margin: 0;
    }

    .chat-box {
      height: 70vh;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .message {
      padding: 10px 15px;
      border-radius: 15px;
      margin: 5px;
      max-width: 70%;
      background: white;
    }

    .me {
      background: #ff4d6d;
      color: white;
      margin-left: auto;
    }

    .input-box {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
    }

    button {
      padding: 12px;
      font-size: 20px;
      border: none;
      cursor: pointer;
    }

    .emoji-panel {
      position: fixed;
      bottom: 60px;
      width: 100%;
      background: white;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }

    .emoji-panel span {
      font-size: 24px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2 id="chatWith"></h2>

<div class="chat-box" id="chatBox"></div>

<div class="emoji-panel" id="emojiPanel"></div>

<div class="input-box">
  <button onclick="toggleEmoji()">😊</button>
  <input id="msg" placeholder="اكتب رسالة..." onkeypress="handleKey(event)">
  <button onclick="send()">➤</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
  authDomain: "marriage-app-3b2d2.firebaseapp.com",
  projectId: "marriage-app-3b2d2",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("userEmail");
const chatUser = localStorage.getItem("chatUser");

document.getElementById("chatWith").innerText = "💬 مع " + chatUser;

const chatBox = document.getElementById("chatBox");

/* 🔥 إرسال */
window.send = async () => {
  const text = document.getElementById("msg").value;
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    from: currentUser,
    to: chatUser,
    text: text,
    time: Date.now()  // 🔥 ثابت
  });

  document.getElementById("msg").value = "";
};

/* 🔥 Enter */
window.handleKey = (e) => {
  if (e.key === "Enter") send();
};

/* 😈 Emoji */
window.toggleEmoji = () => {
  const panel = document.getElementById("emojiPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

window.addEmoji = (e) => {
  document.getElementById("msg").value += e;
};

/* 😈 إيموجي كتير */
const emojis = [
"😀","😁","😂","🤣","😃","😄","😅","😆","😉","😊","😍","😘","😜","🤩",
"😎","😢","😭","😡","😱","😴","🤔","🙄","😇","🥰","😋","😏",
"❤️","💔","💖","💙","💚","💛","🔥","✨","🌹","🎉","👍","👎","👏",
"🙏","👌","💪","👀","🎶","🍕","🍔","🍟","☕","🍓","🍎","🍉"
];

const panel = document.getElementById("emojiPanel");
emojis.forEach(e => {
  panel.innerHTML += `<span onclick="addEmoji('${e}')">${e}</span>`;
});

/* ⚡ Realtime */
onSnapshot(collection(db, "messages"), (snapshot) => {
  let messages = [];

  snapshot.forEach(doc => {
    const msg = doc.data();

    if (
      (msg.from === currentUser && msg.to === chatUser) ||
      (msg.from === chatUser && msg.to === currentUser)
    ) {
      messages.push(msg);
    }
  });

  // 🔥 ترتيب يدوي
  messages.sort((a, b) => a.time - b.time);

  chatBox.innerHTML = "";

  messages.forEach(msg => {
    chatBox.innerHTML += `
      <div class="message ${msg.from === currentUser ? 'me' : ''}">
        ${msg.text}
      </div>
    `;
  });

  chatBox.scrollTop = chatBox.scrollHeight;
});
</script>

</body>
</html>
