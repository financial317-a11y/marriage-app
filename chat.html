<!DOCTYPE html>
<html dir="rtl">
<head>
  <title>الشات 💬</title>

  <!-- 🔥 مكتبة الإيموجي -->
  <script src="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@4.6.2/dist/index.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #ffe6ea;
      margin: 0;
    }

    .chat-box {
      height: 70vh;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .message {
      padding: 10px 15px;
      border-radius: 15px;
      margin: 5px;
      max-width: 70%;
      background: white;
    }

    .me {
      background: #ff4d6d;
      color: white;
      margin-left: auto;
    }

    .input-box {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      border: none;
      cursor: pointer;
    }

    .send-btn {
      background: #ff4d6d;
      color: white;
    }

    .emoji-btn {
      font-size: 20px;
    }
  </style>
</head>

<body>

<h2 id="chatWith">💬</h2>

<div class="chat-box" id="chatBox"></div>

<div class="input-box">
  <button id="emojiBtn" class="emoji-btn">😊</button>

  <!-- 📷 رفع صورة -->
  <input type="file" id="fileInput" style="display:none" accept="image/*">
  <button onclick="document.getElementById('fileInput').click()">📷</button>

  <!-- 🎤 تسجيل صوت -->
  <button onclick="startRecording()">🎤</button>

  <input id="msg" placeholder="اكتب رسالة..." onkeypress="handleKey(event)">
  <button class="send-btn" onclick="send()">➤</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
  authDomain: "marriage-app-3b2d2.firebaseapp.com",
  projectId: "marriage-app-3b2d2",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("userEmail");
const chatUser = localStorage.getItem("chatUser");

document.getElementById("chatWith").innerText = "💬 مع " + chatUser;

const chatBox = document.getElementById("chatBox");

/* 😈 Emoji picker */
const picker = new EmojiButton();
const button = document.getElementById('emojiBtn');

button.addEventListener('click', () => {
  picker.togglePicker(button);
});

picker.on('emoji', emoji => {
  document.getElementById("msg").value += emoji;
});

/* 🔥 إرسال */
window.send = async () => {
  const text = document.getElementById("msg").value;
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    from: currentUser,
    to: chatUser,
    text: text,
    type: "text"
  });

  document.getElementById("msg").value = "";
  loadMessages();
};

/* 🔥 Enter */
window.handleKey = (e) => {
  if (e.key === "Enter") send();
};

/* 📷 رفع صورة */
document.getElementById("fileInput").addEventListener("change", async function() {
  const file = this.files[0];

  const reader = new FileReader();
  reader.onload = async function(e) {
    await addDoc(collection(db, "messages"), {
      from: currentUser,
      to: chatUser,
      image: e.target.result,
      type: "image"
    });

    loadMessages();
  };

  reader.readAsDataURL(file);
});

/* 🎤 تسجيل صوت */
let mediaRecorder;
window.startRecording = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(stream);
  let chunks = [];

  mediaRecorder.ondataavailable = e => chunks.push(e.data);

  mediaRecorder.onstop = async () => {
    const blob = new Blob(chunks);
    const reader = new FileReader();

    reader.onloadend = async () => {
      await addDoc(collection(db, "messages"), {
        from: currentUser,
        to: chatUser,
        audio: reader.result,
        type: "audio"
      });

      loadMessages();
    };

    reader.readAsDataURL(blob);
  };

  mediaRecorder.start();

  setTimeout(() => {
    mediaRecorder.stop();
  }, 3000); // تسجيل 3 ثواني
};

/* 📩 تحميل الرسائل */
async function loadMessages() {
  const snapshot = await getDocs(collection(db, "messages"));

  chatBox.innerHTML = "";

  snapshot.forEach((doc) => {
    const msg = doc.data();

    if (
      (msg.from === currentUser && msg.to === chatUser) ||
      (msg.from === chatUser && msg.to === currentUser)
    ) {

      if (msg.type === "text") {
        chatBox.innerHTML += `
          <div class="message ${msg.from === currentUser ? 'me' : ''}">
            ${msg.text}
          </div>
        `;
      }

      if (msg.type === "image") {
        chatBox.innerHTML += `
          <div class="message">
            <img src="${msg.image}" width="150">
          </div>
        `;
      }

      if (msg.type === "audio") {
        chatBox.innerHTML += `
          <div class="message">
            <audio controls src="${msg.audio}"></audio>
          </div>
        `;
      }
    }
  });

  chatBox.scrollTop = chatBox.scrollHeight;
}

loadMessages();
setInterval(loadMessages, 2000);
</script>

</body>
</html>
