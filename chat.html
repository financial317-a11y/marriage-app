<!DOCTYPE html>
<html dir="rtl">
<head>
  <title>الشات 💬</title>

  <style>
    body {
      font-family: Arial;
      background: #ffe6ea;
      margin: 0;
    }

    .chat-box {
      height: 70vh;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .message {
      padding: 10px;
      border-radius: 15px;
      margin: 5px;
      max-width: 70%;
      background: white;
    }

    .me {
      background: #ff4d6d;
      color: white;
      margin-left: auto;
    }

    .input-box {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      align-items: center;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      font-size: 20px;
      border: none;
      cursor: pointer;
      background: #eee;
    }

    .send-btn {
      background: #ff4d6d;
      color: white;
    }

    .emoji-panel {
      position: fixed;
      bottom: 60px;
      width: 100%;
      background: white;
      display: none;
      padding: 10px;
    }

    .emoji-panel span {
      font-size: 24px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2 id="chatWith"></h2>

<!-- 🟢 الحالة -->
<div id="status"></div>

<!-- ✍️ typing -->
<div id="typing" style="color:gray;"></div>

<div class="chat-box" id="chatBox"></div>

<div id="recordBox" style="
  display:none;
  position:fixed;
  bottom:70px;
  right:10px;
  background:white;
  padding:10px;
  border-radius:10px;
">
🎤 جاري التسجيل...
<div id="wave">▂▃▅▇▅▃▂</div>
</div>

<div class="emoji-panel" id="emojiPanel"></div>

<div class="input-box">
  <button onclick="toggleEmoji()">😊</button>
  <button onclick="document.getElementById('fileInput').click()">📷</button>

  <button 
    onmousedown="startRecording()" 
    onmouseup="stopRecording()"
    ontouchstart="startRecording()" 
    ontouchend="stopRecording()"
  >🎤</button>

  <input id="msg" placeholder="اكتب رسالة..." onkeypress="handleKey(event)">
  <button class="send-btn" onclick="send()">➤</button>
</div>

<input type="file" id="fileInput" style="display:none">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

/* 🟢 ضفت doc + setDoc فقط */
import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
  authDomain: "marriage-app-3b2d2.firebaseapp.com",
  projectId: "marriage-app-3b2d2",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("userEmail");
const chatUser = localStorage.getItem("chatUser");

document.getElementById("chatWith").innerText = "💬 مع " + chatUser;

const chatBox = document.getElementById("chatBox");

/* 🟢 أنا Online */
setDoc(doc(db, "status", currentUser), {
  online: true
});

/* 🟢 حالة الطرف التاني */
onSnapshot(doc(db, "status", chatUser), (docSnap) => {
  const data = docSnap.data();

  document.getElementById("status").innerText =
    data?.online ? "🟢 متصل" : "⚫ غير متصل";
});

/* إرسال */
window.send = async () => {
  const text = document.getElementById("msg").value;
  if (!text) return;

  await addDoc(collection(db, "messages"), {
   from: currentUser,
   to: chatUser,
   text: text,
   time: Date.now(),
   seen: false
  });

  document.getElementById("msg").value = "";
};

/* Enter */
window.handleKey = (e) => {
  if (e.key === "Enter") send();
};

/* ✍️ typing */
let typingTimeout;

document.getElementById("msg").addEventListener("input", () => {
  const typingDiv = document.getElementById("typing");

  typingDiv.innerText = "✍️ يكتب الآن...";

  clearTimeout(typingTimeout);

  typingTimeout = setTimeout(() => {
    typingDiv.innerText = "";
  }, 2000);
});

/* Emoji */
window.toggleEmoji = () => {
  const panel = document.getElementById("emojiPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

window.addEmoji = (emoji) => {
  document.getElementById("msg").value += emoji;
};

const emojis = ["😀","😂","😍","🔥","❤️","👍","😭","😎","😡","🥰","😜","🤩"];
const panel = document.getElementById("emojiPanel");

emojis.forEach(e => {
  panel.innerHTML += `<span onclick="addEmoji('${e}')">${e}</span>`;
});

/* صورة */
document.getElementById("fileInput").addEventListener("change", function() {
  const file = this.files[0];
  const reader = new FileReader();

  reader.onload = async function(e) {
    await addDoc(collection(db, "messages"), {
      from: currentUser,
      to: chatUser,
      image: e.target.result,
      time: Date.now()
    });
  };

  reader.readAsDataURL(file);
});

/* 🎤 صوت */
let recorder;
let chunks = [];
let stream;

window.startRecording = async () => {
  document.getElementById("recordBox").style.display = "block";

  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  recorder = new MediaRecorder(stream);
  chunks = [];

  recorder.ondataavailable = (e) => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.start();
};

window.stopRecording = () => {
  document.getElementById("recordBox").style.display = "none";

  if (!recorder) return;

  recorder.onstop = async () => {
    if (chunks.length === 0) return;

    const blob = new Blob(chunks, { type: "audio/webm" });
    const reader = new FileReader();

    reader.onloadend = async () => {
      await addDoc(collection(db, "messages"), {
        from: currentUser,
        to: chatUser,
        audio: reader.result,
        time: Date.now()
      });
    };

    reader.readAsDataURL(blob);

    stream.getTracks().forEach(track => track.stop());
  };

  recorder.stop();
};

/* 🎵 ذبذبات */
setInterval(() => {
  const wave = document.getElementById("wave");
  if (wave && document.getElementById("recordBox").style.display === "block") {
    const shapes = ["▂▃▅▇▅▃▂", "▃▅▇▅▃▂▃", "▅▇▅▃▂▃▅"];
    wave.innerText = shapes[Math.floor(Math.random() * shapes.length)];
  }
}, 200);

/* عرض الرسائل */
onSnapshot(collection(db, "messages"), (snapshot) => {
  let messages = [];

  snapshot.forEach(doc => {
    const msg = doc.data();
    if (msg.to === currentUser && !msg.seen) {
  doc.ref.update({ seen: true });
}

    if (
      (msg.from === currentUser && msg.to === chatUser) ||
      (msg.from === chatUser && msg.to === currentUser)
    ) {
      if (msg.time) messages.push(msg);
    }
  });

  messages.sort((a, b) => a.time - b.time);

  chatBox.innerHTML = "";

  messages.forEach(msg => {
    chatBox.innerHTML += `
      <div class="message ${msg.from === currentUser ? 'me' : ''}">
${msg.text || ""}
${msg.from === currentUser ? `<div style="font-size:12px">${msg.seen ? "✔✔" : "✔"}</div>` : ""}        ${msg.image ? `<br><img src="${msg.image}" width="120">` : ""}
        ${msg.audio ? `<br><audio controls src="${msg.audio}"></audio>` : ""}
      </div>
    `;
  });

  chatBox.scrollTop = chatBox.scrollHeight;
});
</script>

</body>
</html>
