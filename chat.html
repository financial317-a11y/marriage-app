<!DOCTYPE html>
<html dir="rtl">
<head>
  <title>الشات 💬</title>

  <style>
    body {
      font-family: Arial;
      background: #ffe6ea;
      margin: 0;
    }

    .chat-box {
      height: 70vh;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .message {
      padding: 10px 15px;
      border-radius: 15px;
      margin: 5px;
      max-width: 70%;
      background: white;
    }

    .me {
      background: #ff4d6d;
      color: white;
      margin-left: auto;
    }

    .input-box {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      align-items: center;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 12px;
      border: none;
      cursor: pointer;
      font-size: 20px; /* 🔥 كبرنا الأزرار */
    }

    .send-btn {
      background: #ff4d6d;
      color: white;
    }

    .tools button {
      background: #eee;
    }

    .emoji-panel {
      position: fixed;
      bottom: 60px;
      width: 100%;
      background: white;
      max-height: 200px;
      overflow-y: auto;
      display: none;
      padding: 10px;
    }

    .emoji-panel span {
      font-size: 24px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2 id="chatWith">💬</h2>

<div class="chat-box" id="chatBox"></div>

<!-- 😈 الإيموجي -->
<div class="emoji-panel" id="emojiPanel"></div>

<div class="input-box">

  <div class="tools">
    <button onclick="toggleEmoji()">😊</button>
    <button onclick="document.getElementById('fileInput').click()">📷</button>
    <button onclick="startRecording()">🎤</button>
  </div>

  <input id="msg" placeholder="اكتب رسالة..." onkeypress="handleKey(event)">
  <button class="send-btn" onclick="send()">➤</button>

</div>

<input type="file" id="fileInput" style="display:none" accept="image/*">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
  authDomain: "marriage-app-3b2d2.firebaseapp.com",
  projectId: "marriage-app-3b2d2",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("userEmail");
const chatUser = localStorage.getItem("chatUser");

document.getElementById("chatWith").innerText = "💬 مع " + chatUser;

const chatBox = document.getElementById("chatBox");

/* 🔥 إرسال */
window.send = async () => {
  const text = document.getElementById("msg").value;
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    from: currentUser,
    to: chatUser,
    text: text,
    type: "text"
  });

  document.getElementById("msg").value = "";
  loadMessages();
};

/* 🔥 Enter */
window.handleKey = (e) => {
  if (e.key === "Enter") send();
};

/* 😈 الإيموجي */
window.toggleEmoji = () => {
  const panel = document.getElementById("emojiPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

window.addEmoji = (emoji) => {
  document.getElementById("msg").value += emoji;
};

/* 😈 قائمة إيموجي */
const emojis = ["😀","😂","😍","😘","😎","😭","😡","😱","😴","🤔","🥰","😜",
"❤️","💔","💖","🔥","✨","🌹","🎉","👍","👏","🙏","👌","💪","👀"];

const panel = document.getElementById("emojiPanel");
emojis.forEach(e => {
  panel.innerHTML += `<span onclick="addEmoji('${e}')">${e}</span>`;
});

/* 📷 صورة */
document.getElementById("fileInput").addEventListener("change", function() {
  const file = this.files[0];

  const reader = new FileReader();
  reader.onload = async function(e) {
    await addDoc(collection(db, "messages"), {
      from: currentUser,
      to: chatUser,
      image: e.target.result,
      type: "image"
    });

    loadMessages();
  };

  reader.readAsDataURL(file);
});

/* 🎤 صوت */
let mediaRecorder;
window.startRecording = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(stream);
  let chunks = [];

  mediaRecorder.ondataavailable = e => chunks.push(e.data);

  mediaRecorder.onstop = async () => {
    const blob = new Blob(chunks);
    const reader = new FileReader();

    reader.onloadend = async () => {
      await addDoc(collection(db, "messages"), {
        from: currentUser,
        to: chatUser,
        audio: reader.result,
        type: "audio"
      });

      loadMessages();
    };

    reader.readAsDataURL(blob);
  };

  mediaRecorder.start();

  setTimeout(() => {
    mediaRecorder.stop();
  }, 3000);
};

/* 📩 تحميل */
async function loadMessages() {
  const snapshot = await getDocs(collection(db, "messages"));

  chatBox.innerHTML = "";

  snapshot.forEach((doc) => {
    const msg = doc.data();

    if (
      (msg.from === currentUser && msg.to === chatUser) ||
      (msg.from === chatUser && msg.to === currentUser)
    ) {

      if (msg.type === "text") {
        chatBox.innerHTML += `<div class="message ${msg.from === currentUser ? 'me' : ''}">${msg.text}</div>`;
      }

      if (msg.type === "image") {
        chatBox.innerHTML += `<div class="message"><img src="${msg.image}" width="150"></div>`;
      }

      if (msg.type === "audio") {
        chatBox.innerHTML += `<div class="message"><audio controls src="${msg.audio}"></audio></div>`;
      }
    }
  });

  chatBox.scrollTop = chatBox.scrollHeight;
}

loadMessages();
setInterval(loadMessages, 2000);
</script>

</body>
</html>
