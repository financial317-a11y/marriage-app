<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #ffe6ea;
    min-height: 100vh;
    text-align: center;
  }

  /* قلوب خفيفة في الخلفية */
  body::before {
    content: "❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    font-size: 30px;
    opacity: 0.1;
    z-index: -1;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    align-content: space-around;
  }

  .card {
    background: white;
    color: black;
    padding: 20px;
    margin: 20px auto;
    border-radius: 15px;
    width: 260px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  img {
    border-radius: 50%;
    width: 90px;
    margin-bottom: 10px;
  }

  button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  margin: 5px;
  cursor: pointer;
  font-size: 18px;
  background: yellow;
}

  button:hover {
  background: gold;
}
  .card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 250px;
  margin: auto;
  text-align: center;
}

.card img {
  border-radius: 50%;
}
  .card {
  transition: transform 0.3s ease, opacity 0.3s ease;
}
</style>
</head>
<body>
  <div class="hearts">
  <div class="heart" style="left:10%">❤️</div>
  <div class="heart" style="left:30%">❤️</div>
  <div class="heart" style="left:50%">❤️</div>
  <div class="heart" style="left:70%">❤️</div>
  <div class="heart" style="left:90%">❤️</div>
</div>

  <h1>مرحبا بك 👋</h1>
  
  <a href="profile.html">بروفايلي 👤</a><br><br>

  <h2>المستخدمين:</h2>

  <div id="users"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
      authDomain: "marriage-app-3b2d2.firebaseapp.com",
      projectId: "marriage-app-3b2d2",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const usersDiv = document.getElementById("users");

    async function loadUsers() {
      const querySnapshot = await getDocs(collection(db, "users"));

      let users = [];

querySnapshot.forEach((doc) => {
  users.push(doc.data());
});

let index = 0;

function showUser() {
  if (index >= users.length) {
    usersDiv.innerHTML = "<h2>خلصت الناس 😅</h2>";
    return;
  }

  const user = users[index];

  usersDiv.innerHTML = `
    <div class="card">
      <img src="${user.image}" width="150"><br><br>
      <h3>${user.name}</h3>

      <button onclick="like()">❤️</button>
      <button onclick="skip()">❌</button>
    </div>
  `;
}

window.like = () => {
  const card = document.querySelector(".card");

  card.style.transform = "translateX(200px)";
  card.style.opacity = "0";

  setTimeout(() => {
    index++;
    showUser();
  }, 300);
};

window.skip = () => {
  const card = document.querySelector(".card");

  card.style.transform = "translateX(-200px)";
  card.style.opacity = "0";

  setTimeout(() => {
    index++;
    showUser();
  }, 300);
};

showUser();
    }

    loadUsers();
    window.likeUser = async function(name) {

  const currentUser = localStorage.getItem("userEmail");

await addDoc(collection(db, "likes"), {
  user: currentUser,
  likedUser: name
});

  alert("عملت لايك ❤️");
};
  </script>

</body>
</html>
