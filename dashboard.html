<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

<style>
  .top-bar {
    width: 100%;
    background: #ff4d6d;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    font-size: 18px;
    font-weight: bold;
  }

  .top-bar span {
    cursor: pointer;
  }

  body {
    margin: 0;
    font-family: Arial;
    background: #ffe6ea;
    min-height: 100vh;
    text-align: center;
  }

  body::before {
    content: "❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️";
    position: fixed;
    width: 100%;
    height: 100%;
    font-size: 30px;
    opacity: 0.1;
    z-index: -1;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    align-content: space-around;
  }

  /* 👇 الصور الدائرية */
  .users-preview {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px;
  }

  .users-preview img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    width: 250px;
    margin: auto;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .card img {
    border-radius: 50%;
    width: 90px;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    margin: 5px;
    cursor: pointer;
    font-size: 18px;
    background: yellow;
  }

  button:hover {
    background: gold;
  }
</style>
</head>

<body>

  <div class="top-bar">
    <span>👋 مرحبا بك <b id="userName"></b></span>
    <span onclick="goUsers()">👥 المستخدمين</span>
    <span onclick="goMessages()">💬 الرسائل</span>
    <span onclick="goProfile()">👤 بروفايلي</span>
    <span onclick="goSearch()">🔎 البحث</span>
<span onclick="goLikes()">❤️ الإعجابات</span>
<span onclick="goVisits()">👁️ الزيارات</span>
  </div>

  <!-- 👇 هنا الصور الدائرية -->
  <div class="users-preview" id="usersPreview"></div>

  <div id="users"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
  authDomain: "marriage-app-3b2d2.firebaseapp.com",
  projectId: "marriage-app-3b2d2",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const usersDiv = document.getElementById("users");
const previewDiv = document.getElementById("usersPreview");

let users = [];
let index = 0;

/* 👇 عرض الصور الدائرية */
function showPreview() {
  previewDiv.innerHTML = "";

  users.slice(0, 5).forEach(user => {
    const img = document.createElement("img");
    img.src = user.image;
    previewDiv.appendChild(img);
  });
}

async function loadUsers() {
  const querySnapshot = await getDocs(collection(db, "users"));

  querySnapshot.forEach((doc) => {
    users.push(doc.data());
  });

  showPreview(); // 👈 مهم
  showUser();
}

function showUser() {
  if (users.length === 0) {
    usersDiv.innerHTML = "<h2>مفيش مستخدمين 😅</h2>";
    return;
  }

  if (index >= users.length) {
    usersDiv.innerHTML = "<h2>خلصت الناس 😅</h2>";
    return;
  }

  const user = users[index];

 usersDiv.innerHTML += `
  <div class="card">
<img src="${user.image}" onclick="openProfile('${user.name}')" style="cursor:pointer"><br><br>
    
      <h3>${user.name} - ${user.age} سنة</h3>
      <p>📍 ${user.country}</p>
      <p>💼 ${user.job}</p>
      <p>📏 ${user.height}</p>

      <button onclick="like()">❤️</button>
      <button onclick="skip()">❌</button>
    </div>
  `;
}

window.goUsers = () => {
  window.location.href = "users.html";
};

window.goMessages = () => {
  window.location.href = "chat.html";
};

window.goProfile = () => {
  window.location.href = "profile.html";
};

window.like = async () => {
  const currentUser = localStorage.getItem("userEmail");
  const likedUser = users[index].name;

  await addDoc(collection(db, "likes"), {
    from: currentUser,
    to: likedUser
  });

  const q = query(
    collection(db, "likes"),
    where("from", "==", likedUser),
    where("to", "==", currentUser)
  );

  const snapshot = await getDocs(q);

  if (!snapshot.empty) {
    localStorage.setItem("chatUser", likedUser);
    window.location.href = "chat.html";
  }

  const card = document.querySelector(".card");

  card.style.transform = "translateX(200px)";
  card.style.opacity = "0";

  setTimeout(() => {
    index++;
    showUser();
  }, 300);
};

window.skip = () => {
  const card = document.querySelector(".card");

  card.style.transform = "translateX(-200px)";
  card.style.opacity = "0";

  setTimeout(() => {
    index++;
    showUser();
  }, 300);
};

loadUsers();
  window.goSearch = () => {
  window.location.href = "search.html";
};

window.goLikes = () => {
  window.location.href = "likes.html";
};

window.goVisits = () => {
  window.location.href = "visits.html";
};
  window.openProfile = (name) => {
  localStorage.setItem("viewUser", name);
  window.location.href = "profile.html";
};

</script>

</body>
</html>
