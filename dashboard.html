<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

  <h1>مرحبا بك 👋</h1>

  <h2>المستخدمين:</h2>

  <div id="users"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
      authDomain: "marriage-app-3b2d2.firebaseapp.com",
      projectId: "marriage-app-3b2d2",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const usersDiv = document.getElementById("users");

    async function loadUsers() {
      const querySnapshot = await getDocs(collection(db, "users"));

      querySnapshot.forEach((doc) => {
        const user = doc.data();

        usersDiv.innerHTML += `
          <div>
            <p>👤 ${user.name} - ${user.age} سنة</p>
           <button onclick="likeUser('${user.name}')">اهتمام ❤️</button>
          </div>
          <br>
        `;
      });
    }

    loadUsers();
    window.likeUser = async function(name) {

  const currentUser = localStorage.getItem("userEmail");

await addDoc(collection(db, "likes"), {
  user: currentUser,
  likedUser: name
});

  alert("عملت لايك ❤️");
};
  </script>

</body>
</html>
