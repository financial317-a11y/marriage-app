<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

<style>
  body {
    margin: 0;
    font-family: Arial;

    /* اللون */
    background: linear-gradient(135deg, #ff758c, #ff7eb3);

    /* الصورة */
    background-image: url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2');
    background-size: cover;
    background-blend-mode: overlay;

    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }

  .hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: -1;
  }

  .heart {
    position: absolute;
    color: rgba(255,255,255,0.2);
    font-size: 30px;
    animation: float 6s infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
  }

  .card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 20px;
    margin: 15px;
    border-radius: 15px;
  }

  img {
    border-radius: 50%;
    width: 80px;
  }

  button {
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 20px;
    cursor: pointer;
  }
</style></head>
<body>
  <div class="hearts">
  <div class="heart" style="left:10%">❤️</div>
  <div class="heart" style="left:30%">❤️</div>
  <div class="heart" style="left:50%">❤️</div>
  <div class="heart" style="left:70%">❤️</div>
  <div class="heart" style="left:90%">❤️</div>
</div>

  <h1>مرحبا بك 👋</h1>
  
  <a href="profile.html">بروفايلي 👤</a><br><br>

  <h2>المستخدمين:</h2>

  <div id="users"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
      authDomain: "marriage-app-3b2d2.firebaseapp.com",
      projectId: "marriage-app-3b2d2",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const usersDiv = document.getElementById("users");

    async function loadUsers() {
      const querySnapshot = await getDocs(collection(db, "users"));

      querySnapshot.forEach((doc) => {
        const user = doc.data();

        usersDiv.innerHTML += `
         <div class="card">
            <img src="${user.image}" width="80"><br>
            <p>👤 ${user.name}</p>
           <button onclick="likeUser('${user.name}')">اهتمام ❤️</button>
          </div>
          <br>
        `;
      });
    }

    loadUsers();
    window.likeUser = async function(name) {

  const currentUser = localStorage.getItem("userEmail");

await addDoc(collection(db, "likes"), {
  user: currentUser,
  likedUser: name
});

  alert("عملت لايك ❤️");
};
  </script>

</body>
</html>
