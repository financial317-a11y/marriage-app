<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ffe6ea;
      min-height: 100vh;
      text-align: center;
    }

    body::before {
      content: "❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-size: 30px;
      opacity: 0.1;
      z-index: -1;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      align-content: space-around;
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      width: 200px;
    }

    button {
      background: #ff4d6d;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>

</head>
<body>

  <h1>❤️ الناس اللي عملت لك لايك</h1>

  <div id="likes"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
      authDomain: "marriage-app-3b2d2.firebaseapp.com",
      projectId: "marriage-app-3b2d2",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const likesDiv = document.getElementById("likes");

    async function loadLikes() {
      const querySnapshot = await getDocs(collection(db, "likes"));

      querySnapshot.forEach((doc) => {
        const like = doc.data();

       const currentUser = localStorage.getItem("userEmail");

if (like.likedUser === currentUser) {
  likesDiv.innerHTML += `
    <p>👤 ${like.user} عمل لك لايك ❤️</p>
  `;
}
      });
    }

    loadLikes();
  </script>

</body>
</html>
