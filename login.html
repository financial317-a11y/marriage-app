<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

  <h1>تسجيل الدخول</h1>

  <input id="email" type="email" placeholder="الإيميل"><br><br>
  <input id="password" type="password" placeholder="الباسورد"><br><br>

  <button onclick="login()">دخول</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
      authDomain: "marriage-app-3b2d2.firebaseapp.com",
      projectId: "marriage-app-3b2d2",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
  localStorage.setItem("userEmail", email);
  window.location.href = "dashboard.html";
})
        .catch((error) => {
          alert(error.message);
        });
    }
  </script>

</body>
</html>
