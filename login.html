<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ffe6ea;
      min-height: 100vh;
      text-align: center;
    }

    body::before {
      content: "❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-size: 30px;
      opacity: 0.1;
      z-index: -1;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      align-content: space-around;
    }

    /* 🟢 اسم الموقع */
    .site-title {
      color: #ff4d6d;
      margin-top: 40px;
      font-size: 32px;
      font-weight: bold;
    }

    /* 🟢 الكارت */
    .login-box {
      background: white;
      padding: 25px;
      border-radius: 20px;
      width: 300px;
      margin: 20px auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      width: 90%;
    }

    button {
      background: #ff4d6d;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 20px;
      cursor: pointer;
      width: 95%;
    }
  </style>

</head>
<body>

  <!-- 🟢 اسم الموقع -->
  <h1 class="site-title">💖 نصيبك</h1>

  <!-- 🟢 مستطيل تسجيل الدخول -->
  <div class="login-box">
    <h2>تسجيل الدخول</h2>

    <input id="email" type="email" placeholder="الإيميل"><br><br>
    <input id="password" type="password" placeholder="الباسورد"><br><br>

    <button onclick="login()">دخول</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
      authDomain: "marriage-app-3b2d2.firebaseapp.com",
      projectId: "marriage-app-3b2d2",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          localStorage.setItem("userEmail", email);
          window.location.href = "dashboard.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    }
  </script>

</body>
</html>
