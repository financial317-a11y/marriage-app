<!DOCTYPE html>
<html dir="rtl">
<head>
  <title>بروفايلي</title>

  <style>
    body {
      font-family: Arial;
      background: #ffe6ea;
      text-align: center;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 20px;
      width: 320px;
      margin: 30px auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    label {
      display: block;
      text-align: right;
      margin-right: 15px;
      margin-top: 10px;
      font-weight: bold;
    }

    select, input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 95%;
      padding: 12px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>كمل بروفايلك 👤</h2>

  <label>النوع</label>
  <select id="gender">
    <option value="">اختر النوع</option>
    <option>👦 رجل</option>
    <option>👧 امرأة</option>
  </select>

  <label>الاسم</label>
  <input id="name" placeholder="اسمك">

  <label>العمر</label>
  <select id="age"></select>

  <label>الدولة</label>
  <select id="country">
    <option>مصر</option>
    <option>السعودية</option>
    <option>الإمارات</option>
    <option>المغرب</option>
  </select>

  <label>المهنة</label>
  <input id="job" placeholder="المهنة">

  <label>الحالة الاجتماعية</label>
  <select id="status">
    <option>أعزب</option>
    <option>متزوج</option>
    <option>مطلق</option>
  </select>

  <label>الديانة</label>
  <select id="religion">
    <option>مسلم</option>
    <option>مسيحي</option>
  </select>

  <label>التحصيل التعليمي</label>
  <select id="education">
    <option>ثانوي</option>
    <option>جامعي</option>
    <option>ماجستير</option>
  </select>

  <label>عدد الأبناء</label>
  <select id="children">
    <option>0</option>
    <option>1</option>
    <option>2</option>
    <option>3+</option>
  </select>

  <label>الطول</label>
  <select id="height"></select>

  <label>الوزن</label>
  <select id="weight"></select>

  <label>الصورة</label>
  <input id="image" placeholder="رابط صورتك">

  <button onclick="saveProfile()">حفظ البروفايل</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
  authDomain: "marriage-app-3b2d2.firebaseapp.com",
  projectId: "marriage-app-3b2d2",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// الأعمار
for (let i = 18; i <= 60; i++) {
  document.getElementById("age").innerHTML += `<option>${i}</option>`;
}

// الطول
for (let i = 140; i <= 200; i++) {
  document.getElementById("height").innerHTML += `<option>${i} سم</option>`;
}

// الوزن
for (let i = 40; i <= 120; i++) {
  document.getElementById("weight").innerHTML += `<option>${i} كجم</option>`;
}

window.saveProfile = async () => {
  const profile = {
    gender: document.getElementById("gender").value,
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    country: document.getElementById("country").value,
    job: document.getElementById("job").value,
    status: document.getElementById("status").value,
    religion: document.getElementById("religion").value,
    education: document.getElementById("education").value,
    children: document.getElementById("children").value,
    height: document.getElementById("height").value,
    weight: document.getElementById("weight").value,
    image: document.getElementById("image").value
  };

  await addDoc(collection(db, "users"), profile);

  localStorage.setItem("profileDone", "yes");

  alert("تم حفظ البروفايل ✅");
};
</script>

</body>
</html>
