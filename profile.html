<!DOCTYPE html>
<html dir="rtl">
<head>
  <title>بروفايلي</title>

  <style>
    body {
      font-family: Arial;
      background: #ffe6ea;
      text-align: center;
    }

    .box {
      background: #ffccd5;
      padding: 20px;
      border-radius: 20px;
      width: 320px;
      margin: 30px auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    label {
      display: block;
      text-align: right;
      margin-right: 15px;
      margin-top: 10px;
      font-weight: bold;
    }

    select, input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: white;
    }

    button {
      width: 95%;
      padding: 12px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 16px;
      margin-top: 10px;
    }

    .upload-box {
      width: 120px;
      height: 120px;
      background: #eee;
      border-radius: 50%;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      cursor: pointer;
      overflow: hidden;
    }

    .upload-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<!-- الفورم -->
<div class="box" id="formBox">
  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <span>📷</span>
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none">

  <label>النوع</label>
  <select id="gender">
    <option value="">اختر النوع</option>
    <option>👦 رجل</option>
    <option>👧 امرأة</option>
  </select>

  <label>الاسم</label>
  <input id="name" placeholder="اسمك">

  <label>العمر</label>
  <select id="age"></select>

  <label>الدولة</label>
  <select id="country">
  <option>مصر</option>
  <option>السعودية</option>
  <option>الإمارات</option>
  <option>المغرب</option>
  <option>سوريا</option>
  <option>تونس</option>
  <option>الفلبين</option>
</select>

  <label>المهنة</label>
  <input id="job" placeholder="المهنة">

  <label>الحالة الاجتماعية</label>
  <select id="status">
    <option>أعزب</option>
    <option>متزوج</option>
    <option>مطلق</option>
  </select>

  <label>الديانة</label>
  <select id="religion">
    <option>مسلم</option>
    <option>مسيحي</option>
  </select>

  <label>التحصيل التعليمي</label>
  <select id="education">
    <option>ثانوي</option>
    <option>جامعي</option>
    <option>ماجستير</option>
  </select>

  <label>عدد الأبناء</label>
  <select id="children">
    <option>0</option>
    <option>1</option>
    <option>2</option>
    <option>3+</option>
  </select>

  <label>الطول</label>
  <select id="height"></select>

  <label>الوزن</label>
  <select id="weight"></select>

  <button onclick="saveProfile()">حفظ البروفايل</button>
</div>

<!-- عرض البروفايل -->
<div class="box" id="profileView" style="display:none;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, addDoc, collection }from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
  authDomain: "marriage-app-3b2d2.firebaseapp.com",
  projectId: "marriage-app-3b2d2",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
  const userEmail = localStorage.getItem("userEmail");
  import { addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const visitor = localStorage.getItem("userEmail");
const profileOwner = userEmail;

if (visitor && visitor !== profileOwner) {
  await addDoc(collection(db, "visits"), {
    from: visitor,
    to: profileOwner,
    time: Date.now()
  });
}


if (docSnap.exists()) {
  const data = docSnap.data();

  document.getElementById("name").value  = data.name || "";
  document.getElementById("age").value  = data.age || "";
  document.getElementById("job").value  = data.job || "";
}

// الأعمار
for (let i = 18; i <= 60; i++) {
  document.getElementById("age").innerHTML += `<option>${i}</option>`;
}

// الطول
for (let i = 140; i <= 200; i++) {
  document.getElementById("height").innerHTML += `<option>${i} سم</option>`;
}

// الوزن
for (let i = 40; i <= 120; i++) {
  document.getElementById("weight").innerHTML += `<option>${i} كجم</option>`;
}
const docRef = doc(db, "users", userEmail);
const docSnap = await getDoc(docRef);
  
let imageBase64 = "";

/* حفظ */
window.saveProfile = async () => {
  const profile = {
    gender: document.getElementById("gender").value,
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    country: document.getElementById("country").value,
    job: document.getElementById("job").value,
    status: document.getElementById("status").value,
    religion: document.getElementById("religion").value,
    education: document.getElementById("education").value,
    children: document.getElementById("children").value,
    height: document.getElementById("height").value,
    weight: document.getElementById("weight").value,
   image: imageBase64 || ""
  };

const userEmail = localStorage.getItem("userEmail");

await setDoc(doc(db, "users", userEmail), profile);


  alert("تم حفظ البروفايل ✅");

  showProfile(profile);
};

/* عرض البروفايل */
function showProfile(data) {
  document.getElementById("formBox").style.display = "none";
  document.getElementById("profileView").style.display = "block";

  document.getElementById("profileView").innerHTML = `
    <img src="${data.image}" width="100" style="border-radius:50%"><br><br>
    <b>${data.name}</b><br>
    ${data.age} سنة<br>
    ${data.country}<br>
    ${data.job}<br>
    ${data.status}<br>
    ${data.religion}<br>
    ${data.education}<br>
    أطفال: ${data.children}<br>
    الطول: ${data.height}<br>
    الوزن: ${data.weight}
  `;
}


/* صورة */
document.getElementById("fileInput").addEventListener("change", function() {
  const file = this.files[0];

  const reader = new FileReader();
  reader.onload = function(e) {
    imageBase64 = e.target.result;

    document.querySelector(".upload-box").innerHTML =
      `<img src="${imageBase64}">`;
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
