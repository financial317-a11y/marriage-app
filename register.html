<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
</head>
<body>

  <h1>إنشاء حساب</h1>
  <input id="name" type="text" placeholder="اسمك"><br><br>
  <input id="image" type="text" placeholder="رابط صورتك"><br><br>
  <input id="email" type="email" placeholder="الإيميل"><br><br>
  <input id="password" type="password" placeholder="الباسورد"><br><br>

  <button onclick="register()">تسجيل</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
      authDomain: "marriage-app-3b2d2.firebaseapp.com",
      projectId: "marriage-app-3b2d2",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.register = function() {
      const name = document.getElementById("name").value;
      const image = document.getElementById("image").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(async () => {

         const email = document.getElementById("email").value;

         await addDoc(collection(db, "users"), {
           name: name,
           age: 20,
           image: image
         }); 

         alert("تم إنشاء الحساب 🎉");
       })
        .catch((error) => {
          alert(error.message);
        });
    }
  </script>

</body>
</html>
