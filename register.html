<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ffe6ea;
      min-height: 100vh;
      text-align: center;
    }

    body::before {
      content: "❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-size: 30px;
      opacity: 0.1;
      z-index: -1;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      align-content: space-around;
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      width: 200px;
    }

    button {
      background: #ff4d6d;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>

</head>
<body>

  <h1>إنشاء حساب</h1>
  <input id="name" type="text" placeholder="اسمك"><br><br>
  <input id="image" type="text" placeholder="رابط صورتك"><br><br>
  <input id="email" type="email" placeholder="الإيميل"><br><br>
  <input id="password" type="password" placeholder="الباسورد"><br><br>

  <button onclick="register()">تسجيل</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
      authDomain: "marriage-app-3b2d2.firebaseapp.com",
      projectId: "marriage-app-3b2d2",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.register = function() {
      const name = document.getElementById("name").value;
      const image = document.getElementById("image").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(async () => {

 const user = auth.currentUser;

await setDoc(doc(db, "users", user.email), {
  name: name,
  image: image,
  email: user.email
}); 

         alert("تم إنشاء الحساب 🎉");
       })
        .catch((error) => {
          alert(error.message);
        });
    }
  </script>

</body>
</html>
