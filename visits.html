<!DOCTYPE html>
<html dir="rtl">
<head>
  <title>الزيارات</title>
  <style>
    body {
      font-family: Arial;
      background: #ffe6ea;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>👁️ الزيارات</h1>
<p>هنا هتشوف الناس اللي زارتك 👀</p>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMLCut70fC5IQE-GlY5uPn9Ti6sUye2Yk",
  authDomain: "marriage-app-3b2d2.firebaseapp.com",
  projectId: "marriage-app-3b2d2",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = localStorage.getItem("userEmail");

const snapshot = await getDocs(collection(db, "visits"));

snapshot.forEach(doc => {
  const v = doc.data();

  if (v.to === currentUser) {
    document.body.innerHTML += `<p>👤 ${v.from} زار بروفايلك</p>`;
  }
});
</script>

</body>
</html>
